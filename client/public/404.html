<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blitz Business</title>
  <script>
    var path = window.location.pathname;
    var repo = '';
    var url = '/' + repo + '/?p=' + path;
    if (repo && path.startsWith('/' + repo)) {
      url = '/' + repo + '/?p=' + path.slice(repo.length + 1);
    }
    window.location.replace(url);
  </script>
</head>
<body>
</body>
</html>
